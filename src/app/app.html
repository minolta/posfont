<div class="app-shell">
  <header class="app-header">
    <span class="brand">{{ title() }}</span>
    <nav>
      <a routerLink="/orders" routerLinkActive="active">Orders</a>
      <a routerLink="/orders/new" routerLinkActive="active">New order</a>
      <a routerLink="/foods" routerLinkActive="active">Foods</a>
      <a routerLink="/foods/new" routerLinkActive="active">Add food</a>
      <a routerLink="/food-categories" routerLinkActive="active">Categories</a>
      <a routerLink="/food-categories/new" routerLinkActive="active">New category</a>
      <a routerLink="/kitchens" routerLinkActive="active">Kitchens</a>
      <a routerLink="/kitchens/new" routerLinkActive="active">Add kitchen</a>
      <a routerLink="/zones" routerLinkActive="active">Zones</a>
      <a routerLink="/zones/new" routerLinkActive="active">Add zone</a>
      <a routerLink="/tables" routerLinkActive="active">Tables</a>
      <a routerLink="/tables/new" routerLinkActive="active">Add table</a>
    </nav>
    <label class="user-id-field">
      <span class="user-id-label">User ID</span>
      <input
        type="number"
        min="1"
        step="1"
        class="user-id-input"
        placeholder="Operator"
        [value]="userIdInputValue()"
        (input)="onUserIdInput($any($event.target).value)"
        title="Saved in session; sent as userId on new orders and new lines"
      />
    </label>
  </header>
  <main class="app-main">
    <router-outlet />
  </main>
</div>
