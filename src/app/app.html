<div class="app-shell">
  @if (staffChromeVisible()) {
    <header class="app-header">
      <span class="brand">{{ title() }}</span>
      <nav [attr.aria-label]="'nav.main' | t">
        <div class="nav-desktop">
          @for (link of navLinks(); track link.path) {
            @if (link.dividerBefore) {
              <span class="nav-divider" aria-hidden="true"></span>
            }
            <a
              [routerLink]="link.path"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: link.exact !== false }"
              >{{ link.labelKey | t }}</a
            >
          }
          <span class="nav-divider" aria-hidden="true"></span>
          @if (jwtAuth.isAuthenticated()) {
            <button type="button" class="nav-button" (click)="logout()">{{ 'nav.signOut' | t }}</button>
          } @else {
            <a routerLink="/login" routerLinkActive="active">{{ 'nav.signIn' | t }}</a>
          }
          <app-lang-switch />
        </div>

        <div class="nav-mobile">
          <label class="nav-mobile-label" for="nav-mobile-select">{{ 'nav.menu' | t }}</label>
          <select
            id="nav-mobile-select"
            class="nav-mobile-select"
            [value]="navPath()"
            (change)="onMobileNavChange($event)"
          >
            @for (link of navLinks(); track link.path) {
              <option [value]="link.path">{{ link.labelKey | t }}</option>
            }
          </select>
          @if (jwtAuth.isAuthenticated()) {
            <button type="button" class="nav-button nav-button--compact" (click)="logout()">
              {{ 'nav.signOut' | t }}
            </button>
          } @else {
            <a routerLink="/login" routerLinkActive="active" class="nav-mobile-auth">{{ 'nav.signIn' | t }}</a>
          }
          <app-lang-switch />
        </div>
      </nav>
    </header>
  }
  <main class="app-main">
    <router-outlet />
  </main>
</div>
