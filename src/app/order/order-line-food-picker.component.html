<div class="page">
  <a
    [routerLink]="['/orders/new']"
    [queryParams]="{ tableId: tableId }"
    class="back"
    >{{ 'order.linePickerBackNew' | t }}</a
  >
  <h1>{{ 'order.linePickerTitle' | t }}</h1>
  <p class="hint">{{ 'order.foodPickerHint' | t }}</p>

  <div class="toolbar">
    <input
      type="search"
      [placeholder]="'order.searchFoodName' | t"
      [value]="search()"
      (input)="search.set($any($event.target).value)"
    />
    <input
      type="number"
      min="1"
      step="1"
      class="qty"
      [value]="qty()"
      (input)="qty.set($any($event.target).value)"
      [title]="'order.qtyForLine' | t"
    />
  </div>

  <div class="grid">
    @for (f of filteredFoods(); track f.id ?? $index) {
      <button type="button" class="card" (click)="pick(f)">
        @if (pictureSrc(f); as src) {
          <img [src]="src" alt="" />
        } @else {
          <div class="no-pic">{{ 'common.noImage' | t }}</div>
        }
        <div class="name">{{ foodPickerLabel(f) }}</div>
        <div class="price">{{ f.basePrice | number: '1.2-2' }}</div>
      </button>
    } @empty {
      <p class="empty">{{ 'common.noResults' | t:{ entity: ('order.food' | t) } }}</p>
    }
  </div>
</div>
